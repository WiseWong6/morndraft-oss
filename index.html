<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MornDraft — Agent 编辑器，支持 Markdown、Mermaid、JSON、HTML 的预览、编辑与导出。" />
    <meta name="color-scheme" content="light dark" />
    <title>明日回声-MornDraft</title>
    <link rel="icon" type="image/webp" href="./morndraft-icon-light.webp" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/webp" href="./morndraft-icon-dark.webp" media="(prefers-color-scheme: dark)" />
    <link rel="preload" href="./fonts/morndraft-fonts-critical.css" as="style" />
    <link rel="stylesheet" href="./fonts/morndraft-fonts-critical.css" />
    <script>
      try {
        var themeMode = localStorage.getItem('morndraft.oss.theme');
        var theme = themeMode === 'dark' ? 'dark' : 'light';
        document.documentElement.dataset.theme = theme;
      } catch (_) {}
    </script>
    <style>
      html, body, #root {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      /* === Skeleton loading screen: source (left) + final (right) === */
      .skeleton-app {
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: #f5f5f0;
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      }
      [data-theme="dark"] .skeleton-app {
        background: #111113;
      }
      .skeleton-header {
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 0 16px;
        border-bottom: 1px solid #d9d6cc;
        flex-shrink: 0;
      }
      [data-theme="dark"] .skeleton-header {
        border-color: #3a3a3c;
      }
      .skeleton-header-left,
      .skeleton-header-right {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .skeleton-logo {
        width: 132px;
        height: 26px;
      }
      .skeleton-icon {
        width: 28px;
        height: 28px;
        border-radius: 7px;
      }
      .skeleton-pill {
        width: 64px;
        height: 26px;
        border-radius: 7px;
      }
      .skeleton-main {
        flex: 1;
        display: flex;
        min-height: 0;
        overflow: hidden;
      }
      .skeleton-source-pane {
        flex: 1 1 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #d9d6cc;
        background: #f5f5f0;
        overflow: hidden;
      }
      [data-theme="dark"] .skeleton-source-pane {
        border-color: #3a3a3c;
        background: #111113;
      }
      .skeleton-pane-toolbar {
        height: 46px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 16px;
        border-bottom: 1px solid #d9d6cc;
        flex-shrink: 0;
      }
      [data-theme="dark"] .skeleton-pane-toolbar {
        border-color: #3a3a3c;
      }
      .skeleton-source-lines {
        flex: 1;
        min-height: 0;
        padding: 20px 18px;
      }
      .skeleton-final-pane {
        flex: 1 1 0;
        min-width: 0;
        display: flex;
        flex-direction: column;
        background: #ffffff;
        overflow: hidden;
      }
      [data-theme="dark"] .skeleton-final-pane {
        background: #161618;
      }
      .skeleton-final-stage {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        padding: 56px clamp(20px, 4vw, 64px);
      }
      .skeleton-document {
        width: min(100%, 760px);
        margin: 0 auto;
      }
      .skeleton-bar {
        background: linear-gradient(90deg, #a19b8c 25%, #d9d6cc 50%, #a19b8c 75%);
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.5s ease-in-out infinite;
        border-radius: 4px;
      }
      [data-theme="dark"] .skeleton-bar {
        background: linear-gradient(90deg, #2c2c2e 25%, #3a3a3c 50%, #2c2c2e 75%);
        background-size: 200% 100%;
      }
      @keyframes skeleton-shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      @media (max-width: 767px) {
        .skeleton-header {
          padding: 0 12px;
        }
        .skeleton-logo {
          width: 104px;
        }
        .skeleton-header-right .skeleton-pill,
        .skeleton-source-pane {
          display: none;
        }
        .skeleton-final-stage {
          padding: 36px 16px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="skeleton-app" aria-hidden="true">
        <div class="skeleton-header">
          <div class="skeleton-header-left">
            <div class="skeleton-bar skeleton-logo"></div>
          </div>
          <div class="skeleton-header-right">
            <div class="skeleton-bar skeleton-icon"></div>
            <div class="skeleton-bar skeleton-pill"></div>
            <div class="skeleton-bar skeleton-pill"></div>
          </div>
        </div>
        <div class="skeleton-main">
          <section class="skeleton-source-pane">
            <div class="skeleton-pane-toolbar">
              <div class="skeleton-bar" style="width:62px;height:14px;"></div>
              <div style="flex:1;"></div>
              <div class="skeleton-bar skeleton-icon" style="width:24px;height:24px;"></div>
              <div class="skeleton-bar skeleton-icon" style="width:24px;height:24px;"></div>
            </div>
            <div class="skeleton-source-lines">
              <div class="skeleton-bar" style="width:72%;height:13px;margin-bottom:12px;"></div>
              <div class="skeleton-bar" style="width:88%;height:13px;margin-bottom:12px;"></div>
              <div class="skeleton-bar" style="width:64%;height:13px;margin-bottom:12px;"></div>
              <div class="skeleton-bar" style="width:80%;height:13px;margin-bottom:12px;"></div>
              <div class="skeleton-bar" style="width:52%;height:13px;margin-bottom:12px;"></div>
              <div class="skeleton-bar" style="width:76%;height:13px;"></div>
            </div>
          </section>
          <section class="skeleton-final-pane">
            <div class="skeleton-pane-toolbar">
              <div class="skeleton-bar" style="width:46px;height:14px;"></div>
              <div class="skeleton-bar" style="width:96px;height:14px;"></div>
              <div style="flex:1;"></div>
              <div class="skeleton-bar skeleton-pill" style="width:52px;"></div>
              <div class="skeleton-bar skeleton-pill" style="width:52px;"></div>
            </div>
            <div class="skeleton-final-stage">
              <div class="skeleton-document">
                <div class="skeleton-bar" style="width:64%;height:26px;margin-bottom:16px;"></div>
                <div class="skeleton-bar" style="width:100%;height:12px;margin-bottom:10px;"></div>
                <div class="skeleton-bar" style="width:92%;height:12px;margin-bottom:10px;"></div>
                <div class="skeleton-bar" style="width:84%;height:12px;margin-bottom:20px;"></div>
                <div class="skeleton-bar" style="width:100%;height:96px;border-radius:8px;margin-bottom:20px;"></div>
                <div class="skeleton-bar" style="width:48%;height:16px;margin-bottom:12px;"></div>
                <div class="skeleton-bar" style="width:96%;height:12px;margin-bottom:10px;"></div>
                <div class="skeleton-bar" style="width:80%;height:12px;"></div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
    <script type="module" src="/apps/web-oss/src/index.ts"></script>
  </body>
</html>
