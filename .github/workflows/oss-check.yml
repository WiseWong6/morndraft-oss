name: OSS checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:oss-distribution
      - run: npm run check:workflow-pins
      - run: npm run check:licenses:release
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build:oss
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:oss:editing
      - run: npm run test:e2e:oss
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: oss-e2e-evidence
          path: |
            output/playwright/oss-editing-layout
            output/playwright/oss-e2e
          if-no-files-found: ignore
          retention-days: 7
      - run: npm audit --audit-level=high
