name: OSS release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: oss-release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check:oss-distribution
      - run: npm run check:workflow-pins
      - run: npm run check:licenses:release
      - run: npm run build:oss
      - name: Package exact-SHA OSS release
        run: >-
          npm run release:oss --
          --repository "${{ github.repository }}"
          --sha "${{ github.sha }}"
          --run-id "${{ github.run_id }}"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: output/oss-release/morndraft-oss-${{ github.sha }}.tar.gz
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: morndraft-oss-release-${{ github.sha }}
          path: |
            output/oss-release/morndraft-oss-${{ github.sha }}.tar.gz
            output/oss-release/release-manifest.json
            output/oss-release/SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 7
