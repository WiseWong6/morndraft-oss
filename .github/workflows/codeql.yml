name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "31 2 * * 2"

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@e5d2f324924c57b6cabef9bdd7a1c85d62a89be2 # v3.37.0
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@e5d2f324924c57b6cabef9bdd7a1c85d62a89be2 # v3.37.0
