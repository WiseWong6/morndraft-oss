# Main-only static OSS production surface. Replace the certificate paths only
# during the documented DigiCert-to-Certbot transition; do not add API proxies.
map $uri $morndraft_cache_control {
    default "no-store";
    ~^/assets/ "public, max-age=31536000, immutable";
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 404;
}

server {
    listen 80;
    listen [::]:80;
    server_name morndraft.com;
    return 301 https://morndraft.com$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    # Ubuntu 22.04 ships Nginx 1.18, before ssl_reject_handshake existed.
    # Present the current main certificate and fail closed at HTTP with 404.
    ssl_certificate /etc/nginx/ssl/morndraft.com/morndraft.com.pem;
    ssl_certificate_key /etc/nginx/ssl/morndraft.com/morndraft.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    return 404;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name morndraft.com;

    ssl_certificate /etc/nginx/ssl/morndraft.com/morndraft.com.pem;
    ssl_certificate_key /etc/nginx/ssl/morndraft.com/morndraft.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MornDraftTLS:10m;
    ssl_session_tickets off;

    root /srv/morndraft-static/current;
    index index.html;

    add_header Content-Security-Policy "default-src 'none'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; form-action 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https:; style-src 'self' 'unsafe-inline' data: https:; img-src 'self' data: blob: https:; font-src 'self' data: blob: https:; connect-src 'self' https:; frame-src 'self' data: blob: https:; worker-src 'self' blob:; media-src 'self' data: blob: https:" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), clipboard-read=(self), clipboard-write=(self)" always;
    add_header Cache-Control $morndraft_cache_control always;

    location ^~ /admin {
        return 404;
    }

    location ~ ^/(?:api(?:/|$)|login(?:/|$)|billing(?:/|$)|payment(?:/|$)|sms(?:/|$)|mcp(?:/|$)|hosted-link(?:/|$)) {
        return 404;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
    }

    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known(?:/|$)) {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
